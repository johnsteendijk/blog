<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>John Steendijk</title>
  <meta name="description" content="Short texts by John Steendijk">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%E2%9C%8D</text></svg>">
</head>
<body>
  <header>
    <h1>John Steendijk</h1>
    <p>Lessons on Claude AI</p>
  </header>
  <main id="posts"></main>
  <footer>JS &middot; 2026</footer>
  <script src="posts.js"></script>
  <script>
    const main = document.getElementById("posts");
    posts.forEach(post => {
      const article = document.createElement("article");
      article.innerHTML = `
        <time>${post.date}</time>
        <h2>${post.title}</h2>
        <div class="body">${post.body}</div>
      `;
      main.appendChild(article);
    });
  </script>
</body>
</html>
